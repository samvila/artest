<!doctype html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Empty Project</title>
<meta itemprop="name" content="Empty Project">
<meta name="twitter:title" content="Empty Project">
<meta property="og:title" content="Empty Project">
<meta property="og:site_name" content="Empty Project">
<meta name="description" content="Start with a blank project.">
<meta itemprop="description" content="Start with a blank project.">
<meta property="og:description" content="Start with a blank project.">
<meta name="twitter:description" content="Start with a blank project.">
<script crossorigin="anonymous" src="./external/runtime/runtime.js"></script>
<script>
window.XR8_CAMERA_DEVICE_ID = null;
(function () {
  var PICKED = localStorage.getItem('xr8_camera_device_id');
  if (PICKED) { window.XR8_CAMERA_DEVICE_ID = PICKED; }

  function listCameras() {
    if (!navigator.mediaDevices || !navigator.mediaDevices.enumerateDevices) { return; }
    navigator.mediaDevices.enumerateDevices().then(function (devices) {
      var cams = devices.filter(function (d) { return d.kind === 'videoinput'; });
      if (!cams.length) { return; }

      // 1. Create the container for our UI
      var uiContainer = document.createElement('div');
      uiContainer.style.cssText = 'position:fixed;top:15px;right:15px;z-index:99999;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;';

      // 2. Create the Settings Gear Button
      var settingsBtn = document.createElement('button');
      settingsBtn.innerHTML = '⚙'; // Setting icon
      settingsBtn.style.cssText = 'width:40px;height:40px;border-radius:50%;border:none;background:#222;color:#fff;font-size:20px;cursor:pointer;box-shadow:0 4px 10px rgba(0,0,0,0.3);display:flex;align-items:center;justify-content:center;transition:transform 0.2s;';
      
      // 3. Create the Dropdown Panel
      var panel = document.createElement('div');
      panel.style.cssText = 'display:none;position:absolute;top:50px;right:0;background:rgba(30,30,30,0.95);backdrop-filter:blur(5px);color:#fff;padding:12px;border-radius:8px;box-shadow:0 4px 20px rgba(0,0,0,0.4);min-width:260px;max-width:90vw;max-height:70vh;overflow-auto;';

      var title = document.createElement('div');
      title.textContent = 'Select Camera';
      title.style.cssText = 'font-weight:bold;margin-bottom:8px;border-bottom:1px solid #444;padding-bottom:6px;font-size:14px;';
      panel.appendChild(title);

      // 4. Populate camera rows
      cams.forEach(function (cam, i) {
        var row = document.createElement('div');
        row.style.cssText = 'margin:6px 0;padding:8px;cursor:pointer;border-radius:4px;font-size:12px;transition:background 0.2s;';
        var label = cam.label || ('Camera ' + i);
        row.textContent = label;

        // Visual indicator if this is the currently active camera
        if (cam.deviceId && cam.deviceId === window.XR8_CAMERA_DEVICE_ID) { 
          row.style.background = '#2a6'; 
          row.style.fontWeight = 'bold';
        } else {
          row.onmouseover = function() { this.style.background = '#444'; };
          row.onmouseout = function() { this.style.background = ''; };
        }

        // On selection: save target ID, update window state, and RELOAD page
        row.onclick = function () {
          window.XR8_CAMERA_DEVICE_ID = cam.deviceId;
          localStorage.setItem('xr8_camera_device_id', cam.deviceId);
          location.reload(); 
        };
        panel.appendChild(row);
      });

      // 5. Clear / Reset Selection option
      var clear = document.createElement('div');
      clear.style.cssText = 'margin-top:10px;padding:8px 4px 2px;cursor:pointer;color:#ff6b6b;font-size:12px;border-top:1px solid #444;text-align:center;';
      clear.textContent = 'Reset to default (Front/Back)';
      clear.onclick = function () { 
        window.XR8_CAMERA_DEVICE_ID = null; 
        localStorage.removeItem('xr8_camera_device_id'); 
        location.reload(); 
      };
      panel.appendChild(clear);

      // 6. Toggle visibility logic
      settingsBtn.onclick = function(e) {
        e.stopPropagation();
        if (panel.style.display === 'none') {
          panel.style.display = 'block';
          settingsBtn.style.transform = 'rotate(45deg)';
        } else {
          panel.style.display = 'none';
          settingsBtn.style.transform = 'rotate(0deg)';
        }
      };

      // Close dropdown if user clicks anywhere else on the screen
      document.addEventListener('click', function() {
        panel.style.display = 'none';
        settingsBtn.style.transform = 'rotate(0deg)';
      });
      panel.onclick = function(e) { e.stopPropagation(); };

      // Assembly
      uiContainer.appendChild(settingsBtn);
      uiContainer.appendChild(panel);
      document.body.appendChild(uiContainer);
    });
  }

  if (document.readyState === 'complete' || document.readyState === 'interactive') { listCameras(); }
  else { window.addEventListener('DOMContentLoaded', listCameras); }
})();
</script>
<script crossorigin="anonymous" src="./external/xr/xr.js" async="true" data-preload-chunks="face, slam"></script>
</head>
<body>
<script src="bundle.js"></script>
</body>
</html>
