<!doctype html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Empty Project</title>
<meta itemprop="name" content="Empty Project">
<meta name="twitter:title" content="Empty Project">
<meta property="og:title" content="Empty Project">
<meta property="og:site_name" content="Empty Project">
<meta name="description" content="Start with a blank project.">
<meta itemprop="description" content="Start with a blank project.">
<meta property="og:description" content="Start with a blank project.">
<meta name="twitter:description" content="Start with a blank project.">
<script crossorigin="anonymous" src="./external/runtime/runtime.js"></script>
<script crossorigin="anonymous" src="./external/xr/xr.js" async="true" data-preload-chunks="face, slam"></script>

<style>
  body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    position: relative;
    width: 100vw;
    height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }

  /* Main Action Button */
  #photo-btn {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 999;
    padding: 14px 28px;
    font-size: 16px;
    font-weight: bold;
    color: #000;
    background-color: #fff;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    transition: transform 0.1s ease;
  }

  #photo-btn:active {
    transform: translateX(-50%) scale(0.95);
  }

  /* Camera Flash */
  #flash-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background-color: #fff;
    opacity: 0;
    pointer-events: none;
    z-index: 1000;
  }

  .flash-active {
    animation: cameraFlash 0.35s ease-out;
  }

  @keyframes cameraFlash {
    0% { opacity: 1; }
    100% { opacity: 0; }
  }

  /* Photo Preview Modal Popup */
  #preview-modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background-color: rgba(0, 0, 0, 0.85);
    z-index: 1001;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    box-sizing: border-box;
    padding: 20px;
  }

  #preview-image {
    max-width: 90%;
    max-height: 65vh;
    border-radius: 8px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.5);
    object-fit: contain;
    background-color: #222;
  }

  .modal-buttons {
    margin-top: 25px;
    display: flex;
    gap: 15px;
    width: 100%;
    max-width: 320px;
  }

  .modal-btn {
    flex: 1;
    padding: 12px;
    font-size: 15px;
    font-weight: 600;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    text-align: center;
    transition: background 0.2s;
  }

  .btn-primary {
    background-color: #007aff;
    color: white;
  }

  .btn-primary:hover { background-color: #0063cc; }

  .btn-secondary {
    background-color: #3a3a3c;
    color: white;
  }

  .btn-secondary:hover { background-color: #48484a; }

  #close-btn {
    position: absolute;
    top: 20px;
    right: 20px;
    background: none;
    border: none;
    color: white;
    font-size: 30px;
    cursor: pointer;
    line-height: 1;
  }
</style>
</head>
<body>
  
  <!-- Overrides WebGL settings BEFORE the main bundle runs -->
  <script>
    (function() {
      const originalGetContext = HTMLCanvasElement.prototype.getContext;
      HTMLCanvasElement.prototype.getContext = function(type, attributes) {
        if (type === 'webgl' || type === 'webgl2' || type === 'experimental-webgl') {
          attributes = attributes || {};
          attributes.preserveDrawingBuffer = true; 
        }
        return originalGetContext.call(this, type, attributes);
      };
    })();
  </script>

  <button id="photo-btn">Take Photo</button>
  <div id="flash-overlay"></div>

  <!-- Popup Preview Modal -->
  <div id="preview-modal">
    <button id="close-btn">&times;</button>
    <img id="preview-image" alt="Captured view">
    <div class="modal-buttons">
      <button class="modal-btn btn-secondary" id="save-btn">Save Image</button>
      <button class="modal-btn btn-primary" id="share-btn">Share Photo</button>
    </div>
  </div>

  <script src="bundle.js"></script>

  <script>
    const photoBtn = document.getElementById('photo-btn');
    const flashOverlay = document.getElementById('flash-overlay');
    const previewModal = document.getElementById('preview-modal');
    const previewImage = document.getElementById('preview-image');
    const closeBtn = document.getElementById('close-btn');
    const saveBtn = document.getElementById('save-btn');
    const shareBtn = document.getElementById('share-btn');

    let capturedBlob = null;
    let capturedDataUrl = null;

    photoBtn.addEventListener('click', () => {
      // 1. Hide UI elements
      photoBtn.style.display = 'none';

      // 2. Trigger camera flash visual animation
      flashOverlay.classList.add('flash-active');
      flashOverlay.addEventListener('animationend', () => {
        flashOverlay.classList.remove('flash-active');
      }, { once: true });

      // Small delay matching the flash apex to capture the visual output
      setTimeout(() => {
        try {
          const targetCanvas = document.querySelector('canvas');
          
          if (!targetCanvas) {
            alert("No active application canvas detected to take a picture of.");
            photoBtn.style.display = 'block';
            return;
          }

          // 3. Create a processing canvas to combine the frame + your logo asset
          const processCanvas = document.createElement('canvas');
          processCanvas.width = targetCanvas.width;
          processCanvas.height = targetCanvas.height;
          const ctx = processCanvas.getContext('2d');

          // Copy original WebGL frame onto our processing canvas
          ctx.drawImage(targetCanvas, 0, 0);

          // 4. Load the transparent logo image asset
          const logoImg = new Image();
          logoImg.src = '/assets/logo.png';
          
          logoImg.onload = () => {
            // Define scaling/sizing properties for the logo watermark
            // Makes the logo 15% of the total width of the captured screen
            const logoWidth = processCanvas.width * 0.15; 
            const scaleRatio = logoWidth / logoImg.width;
            const logoHeight = logoImg.height * scaleRatio;

            // Offset distance from the top and right edges
            const padding = 20; 
            const xPos = processCanvas.width - logoWidth - padding;
            const yPos = padding;

            // Draw the transparent logo into the upper right corner
            ctx.drawImage(logoImg, xPos, yPos, logoWidth, logoHeight);

            // 5. Package up the combined final image for viewing/sharing
            capturedDataUrl = processCanvas.toDataURL('image/png');
            previewImage.src = capturedDataUrl;

            processCanvas.toBlob((blob) => {
              capturedBlob = blob;
            }, 'image/png');

            // Show popup overlay
            previewModal.style.display = 'flex';
          };

          logoImg.onerror = () => {
            console.warn("Logo image asset failed to load. Displaying screenshot without watermark.");
            
            // Fallback: If logo path fails, generate screen output without it
            capturedDataUrl = processCanvas.toDataURL('image/png');
            previewImage.src = capturedDataUrl;
            processCanvas.toBlob((blob) => { capturedBlob = blob; }, 'image/png');
            previewModal.style.display = 'flex';
          };

        } catch (err) {
          console.error("Failed to capture image:", err);
          alert("Could not process picture due to security context restrictions.");
          photoBtn.style.display = 'block';
        }
      }, 50);
    });

    // Close preview popup window
    closeBtn.addEventListener('click', () => {
      previewModal.style.display = 'none';
      photoBtn.style.display = 'block';
    });

    // Native platform download trigger
    saveBtn.addEventListener('click', () => {
      if (!capturedDataUrl) return;
      const downloadLink = document.createElement('a');
      downloadLink.href = capturedDataUrl;
      downloadLink.download = 'snapshot.png';
      document.body.appendChild(downloadLink);
      downloadLink.click();
      document.body.removeChild(downloadLink);
    });

    // Native platform web share protocol implementation
    shareBtn.addEventListener('click', async () => {
      if (!capturedBlob) {
        alert("Image processing incomplete. Please try again.");
        return;
      }

      const shareFile = new File([capturedBlob], 'snapshot.png', { type: 'image/png' });

      if (navigator.canShare && navigator.canShare({ files: [shareFile] })) {
        try {
          await navigator.share({
            files: [shareFile],
            title: 'My Snapshot',
            text: 'Check out this photograph!'
          });
        } catch (err) {
          if (err.name !== 'AbortError') {
            console.error('System share failed:', err);
          }
        }
      } else {
        alert("Native sharing is not supported by this platform or context. Try saving the image directly instead.");
      }
    });
  </script>
</body>
</html>
