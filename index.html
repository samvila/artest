 <script>

  function loadMyBundle() {

   console.log('✅ 8th Wall Ready. Loading the project...');

   const script = document.createElement('script');

   script.src = "bundle.js";

   document.body.appendChild(script);

  }



   

  if (window.XR8) {

   // If XR8 is already loaded the project continues

   loadMyBundle();

  } else {

   // If not then it waits for 'xrloaded'

   window.addEventListener('xrloaded', loadMyBundle);

  }

 </script>
